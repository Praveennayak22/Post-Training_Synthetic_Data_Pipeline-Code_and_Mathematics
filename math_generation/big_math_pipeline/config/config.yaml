evol_instruct:
  model: kimi-k2.5              # Kimi model for evolution mutations
  num_mutations: 1                 # 1 = one evolution depth per seed (fast); raise to 3 for full run
  offline_mode: false              # false = use the model endpoint for Evol-Instruct mutations
  temperature: 0.8
  max_new_tokens: 2048
  # WizardMath Reinforced Evol-Instruct 5 operations (from WizardMath paper)
  mutation_strategies:
    - add_constraint       # add side-condition or boundary constraint
    - replace_numbers      # swap concrete numbers with harder ones
    - shift_type           # move problem to related domain (e.g. algebraâ†’geometry)
    - increase_steps       # require more intermediate reasoning steps
    - combine_problems     # fuse two problems into one compound problem

format_converter:
  # Big-Math style: strip MCQ options, rewrite as open-ended
  remove_choices: true
  keep_original: true            # store original alongside converted

teacher_model:
  model: kimi-k2.5          # Kimi K2.5 model for reasoning traces
  # Endpoint from .env MODEL_ENDPOINT takes priority over this value
  endpoint: http://your-cluster-node:xxxx/v1/chat/completions
  temperature: 0.6
  max_new_tokens: 1500      # reduced from 3800 â€” actual traces ~300-600 tokens; speeds up API
  max_new_tokens_cap: 1500  # full teacher generation cap
  fallback_only: false      # false = always call the remote teacher model
  request_timeout_seconds: 120
  retry_attempts: 2         # allow limited retry for transient endpoint issues
  retry_backoff_seconds: 2
  parallel_workers: 2       # parallel remote teacher requests
  think_tag: "<think>"
  enable_thinking: true        # send chat_template_kwargs.enable_thinking=true for <think> traces

verification:
  timeout_seconds: 30
  numeric_precision: 1e-6

reasoning_scale:
  levels:
    0: "Minimal"
    1: "Basic"
    2: "Intermediate"
    3: "Advanced"
    4: "Expert"

pipeline:
  # seed_source is no longer used – enable/disable datasets individually above
  # Dedicated count controls (null = disabled; CLI flags can override).
  seed_count: null
  generate_count: null
  output_dir: data/final
  checkpoint_dir: data/checkpoints
  batch_size: 150              # TheoremQA: ~100/chunk (800 total / 8 jobs)
  domains:
    - number_theory
    - algebra
    - pre_algebra
    - geometry
    - intermediate_algebra
    - polynomial_roots

